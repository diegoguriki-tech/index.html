<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lámina Anatómica Interactiva: Aorta Posterior</title>
    <style>
        :root {
            --primary: #2c3e50;
            --danger: #e74c3c;
            --equino: #d35400;
            --bovino: #27ae60;
            --porcino: #9b59b6;
            --ave: #2980b9;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f6f7; 
            color: #333; 
            margin: 0; 
            padding: 20px; 
        }
        .lamina { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            border: 4px solid var(--primary); 
            border-radius: 12px; 
            padding: 30px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
        }
        h1 { text-align: center; color: var(--danger); text-transform: uppercase; margin-bottom: 5px; font-size: 2.2em; letter-spacing: 1px; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-weight: 400; font-size: 1.1em; border-bottom: 2px solid #aec6cf; padding-bottom: 15px; }
        
        .introduccion { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            background: #fdf2e9; 
            padding: 20px; 
            border-radius: 8px; 
            border-left: 5px solid #e67e22; 
            margin-bottom: 30px; 
        }
        @media (max-width: 768px) { .introduccion { grid-template-columns: 1fr; } }
        
        .instruccion {
            text-align: center;
            background: #e8f4f8;
            color: #1d6fa5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 0.95em;
        }

        /* Sistema de Tarjetas de Anatomía */
        .grid-especies { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
            margin-bottom: 40px; 
        }
        @media (max-width: 900px) { .grid-especies { grid-template-columns: 1fr; } }

        .flip-card {
            background-color: transparent;
            width: 100%;
            height: 520px;
            perspective: 1000px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: left;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .flip-card:hover .flip-card-inner, .flip-card.active .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
        }
        .flip-card-front {
            background-color: #ffffff;
            border: 3px solid #bdc3c7;
            display: flex;
            flex-direction: column;
        }
        .flip-card-back {
            background-color: #fdfefe;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            border: 3px solid var(--primary);
        }

        /* Estilos por Especie */
        .equino .flip-card-front { border-color: var(--equino); }
        .equino .badge { background: var(--equino); }
        .bovino .flip-card-front { border-color: var(--bovino); }
        .bovino .badge { background: var(--bovino); }
        .porcino .flip-card-front { border-color: var(--porcino); }
        .porcino .badge { background: var(--porcino); }
        .ave .flip-card-front { border-color: var(--ave); }
        .ave .badge { background: var(--ave); }

        .badge { 
            align-self: flex-start;
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.75em; 
            padding: 4px 10px; 
            border-radius: 4px; 
            color: white; 
            margin-bottom: 8px;
        }
        .animal-title { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4em; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* Contenedor del Diagrama Autogenerado */
        .img-container {
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdfefe;
            border-radius: 6px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        .img-container svg {
            width: 100%;
            height: 100%;
        }

        .detalles { font-size: 0.88em; line-height: 1.4; color: #555; }
        .btn-ver-ramas {
            margin-top: auto;
            background: #f4f6f7;
            color: var(--primary);
            text-align: center;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            border: 1px dashed #ccc;
        }

        /* Reverso */
        .back-title { margin: 0 0 10px 0; font-size: 1.1em; color: var(--danger); border-bottom: 2px solid #ddd; padding-bottom: 5px; text-transform: uppercase; }
        .lista-ramas { 
            margin: 0; 
            padding-left: 18px; 
            font-size: 0.85em; 
            overflow-y: auto; 
            flex-grow: 1;
            line-height: 1.45;
        }
        .lista-ramas li { margin-bottom: 3px; }
        .lista-ramas strong { color: #2c3e50; }

        /* Matriz Comparativa */
        .contenedor-tabla { overflow-x: auto; margin-top: 20px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .tabla-comparativa { width: 100%; border-collapse: collapse; font-size: 0.9em; min-width: 700px; }
        .tabla-comparativa th { background-color: var(--primary); color: white; padding: 12px; text-align: left; }
        .tabla-comparativa td { padding: 12px; border: 1px solid #dee2e6; }
        .tabla-comparativa tr:nth-child(even) { background-color: #f8f9fa; }
        
        .seccion-titulo { background: var(--primary); color: white; padding: 10px 15px; border-radius: 4px; margin-top: 40px; margin-bottom: 15px; font-size: 1.1em; text-transform: uppercase; font-weight: bold; }
        .nota-alerta { background: #ebf5fb; border-left: 4px solid var(--ave); padding: 10px; border-radius: 4px; margin-top: auto; font-size: 0.8em; color: #2c3e50; }
    </style>
</head>
